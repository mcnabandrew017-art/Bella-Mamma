<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Bella Mamma</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e63946;
            --primary-dark: #c1121f;
            --secondary: #f4a261;
            --dark: #1d3557;
            --light: #f1faee;
            --cream: #fefae0;
            --success: #2a9d8f;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            color: var(--dark);
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
            margin-right: 15px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .order-summary {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-weight: 500;
        }

        .order-item-options {
            font-size: 12px;
            color: #666;
        }

        .order-item-price {
            font-weight: 600;
            color: var(--primary);
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 2px solid var(--dark);
            font-size: 18px;
            font-weight: 600;
        }

        .order-total span:last-child {
            color: var(--primary);
            font-size: 24px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-option:hover {
            border-color: var(--secondary);
        }

        .payment-option.selected {
            border-color: var(--primary);
            background: #fff5f5;
        }

        .payment-option input {
            margin-right: 12px;
        }

        .payment-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .place-order-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .place-order-btn:hover {
            background: var(--primary-dark);
        }

        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
        }

        .empty-cart-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .back-to-menu-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div class="logo">Bella Mamma</div>
    </div>

    <div class="container" id="checkoutContent">
        <div class="card">
            <h2>Delivery Details</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="customerName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customerPhone" required placeholder="082 123 4567">
                </div>
                <div class="form-group">
                    <label>Email (optional)</label>
                    <input type="email" id="customerEmail" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Delivery Address *</label>
                    <textarea id="customerAddress" required rows="3" placeholder="123 Main Street, Suburb"></textarea>
                </div>
                <div class="form-group">
                    <label>Order Type *</label>
                    <select id="orderType" required onchange="toggleAddress()">
                        <option value="delivery">Delivery</option>
                        <option value="pickup">Pickup</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Delivery Instructions</label>
                    <textarea id="deliveryNotes" rows="2" placeholder="Gate code, landmark, etc."></textarea>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Payment</h2>
            <div class="payment-option selected" onclick="selectPayment(this, 'cash')">
                <input type="radio" name="payment" value="cash" checked>
                <span class="payment-icon">💵</span>
                <div>
                    <div><strong>Cash on Delivery</strong></div>
                    <div style="font-size: 12px; color: #666;">Pay when you receive your order</div>
                </div>
            </div>
            <div class="payment-option" onclick="selectPayment(this, 'card')">
                <input type="radio" name="payment" value="card">
                <span class="payment-icon">💳</span>
                <div>
                    <div><strong>Card on Delivery</strong></div>
                    <div style="font-size: 12px; color: #666;">Pay with card when order arrives</div>
                </div>
            </div>
            <div class="payment-option" onclick="selectPayment(this, 'eft')">
                <input type="radio" name="payment" value="eft">
                <span class="payment-icon">🏦</span>
                <div>
                    <div><strong>EFT</strong></div>
                    <div style="font-size: 12px; color: #666;">Electronic funds transfer</div>
                </div>
            </div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h2>Order Summary</h2>
            <div class="order-summary" id="orderSummary">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="order-total">
                <span>Total</span>
                <span id="orderTotal">R0</span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()" id="placeOrderBtn">Place Order</button>
        </div>
    </div>

    <div class="toast" id="toast">Order placed successfully!</div>

    <script>
        const API_URL = '/api';
        let cart = JSON.parse(localStorage.getItem('bellaCart')) || [];
        let selectedPayment = 'cash';

        function loadOrderSummary() {
            const container = document.getElementById('orderSummary');
            const totalEl = document.getElementById('orderTotal');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Your cart is empty</p>
                        <a href="index.html" class="back-to-menu-btn">Back to Menu</a>
                    </div>
                `;
                document.getElementById('placeOrderBtn').disabled = true;
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="order-item">
                    <div class="order-item-info">
                        <div class="order-item-name">${item.name} x${item.quantity}</div>
                        <div class="order-item-options">${item.size} | ${item.crust}</div>
                    </div>
                    <div class="order-item-price">R${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            totalEl.textContent = `R${total.toFixed(2)}`;
        }

        function selectPayment(element, method) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            element.querySelector('input').checked = true;
            selectedPayment = method;
        }

        function toggleAddress() {
            const orderType = document.getElementById('orderType').value;
            const addressField = document.getElementById('customerAddress');
            if (orderType === 'pickup') {
                addressField.placeholder = 'Enter "N/A" for pickup';
            } else {
                addressField.placeholder = '123 Main Street, Suburb';
            }
        }

        async function placeOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const orderType = document.getElementById('orderType').value;
            const notes = document.getElementById('deliveryNotes').value.trim();

            if (!name || !phone || !address) {
                alert('Please fill in all required fields');
                return;
            }

            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const orderData = {
                customer: { 
                    first_name: name.split(' ')[0] || name,
                    last_name: name.split(' ').slice(1).join(' ') || '',
                    email: email,
                    phone: phone,
                    street_address: address
                },
                items: cart,
                orderType: orderType,
                paymentMethod: selectedPayment,
                notes: notes
            };

            try {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (res.ok) {
                    const order = await res.json();
                    showToast(`Order #${order.id || 'placed'} successfully!`);
                    cart = [];
                    localStorage.setItem('bellaCart', JSON.stringify(cart));
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    alert('Failed to place order. Please try again.');
                }
            } catch (err) {
                console.error(err);
                alert('Error placing order. Make sure the server is running.');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        loadOrderSummary();
    </script>
</body>
</html>
